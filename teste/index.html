<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Tuned Car Speed</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body><h1 id="gameTitle">Tuned Car Speed</h1>   

<div id="hud">
  <div id="speed">VEL: 0 KM/H</div>
  <div id="nitro">NITRO: 100%</div>
  <div id="fuel">FUEL: 100%</div>
  <div id="money">MONEY: $0</div>
  <div id="time">TIME: 0 s</div>
</div>

<div id="controls">
  <p>W = acelerar</p>
  <p>S = frear</p>
  <p>A = esquerda</p>
  <p>D = direita</p>
  <p>SHIFT = nitro</p>
  <p>SPACE = drift</p>
</div>

<script type="module" src="./game.js"></script>

</body>
</html>
